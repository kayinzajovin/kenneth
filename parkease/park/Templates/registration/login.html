{% extends 'base.html' %}

{% block title %}
Login
{% endblock %}

{% block content %}

<h1>Login</h1>

{% if form.errors %}
<p class="error">
  Please correct the error below.
</p>
{% endif %}

<form method="post">

  {% csrf_token %}

  <div>
    <label for="id_username">Username</label>
    {{ form.username }}
  </div>

  <div>
    <label for="id_password">Password</label>
    {{ form.password }}
  </div>

  <button type="submit">
    Login
  </button>

  <input type="hidden" name="next" value="{{ next }}" />

</form>

{% endblock %}
