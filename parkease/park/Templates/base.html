<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>
    {% block title %}
    ParkEase
    {% endblock %}
  </title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    nav {
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    table,
    th,
    td {
      border: 1px solid #ccc;
    }

    th,
    td {
      padding: 10px;
      text-align: left;
    }

    .messages {
      list-style: none;
      padding: 0;
    }

    .message {
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 5px;
    }

    .message.success {
      background: #e6ffed;
      color: #1b6238;
    }
  </style>
</head>

<body>

  <nav>
    <a href="{% url 'park:index' %}">Home</a>

    {% if user.is_authenticated %}
      | Logged in as {{ user.username }}
    {% endif %}
  </nav>

  <main>
    {% block content %}
    {% endblock %}
  </main>

</body>

</html>
